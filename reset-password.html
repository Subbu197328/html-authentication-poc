<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gradient">

<div class="d-flex justify-content-center align-items-center vh-100">

    <div class="custom-card text-center">

        <!-- Title -->
        <h2 class="fw-bold mb-2">🔒 Reset Password</h2>
        <p class="mb-4 text-light" style="font-size: 14px;">
            Enter your new password below
        </p>

        <!-- Form -->
        <form action="index.html">

            <!-- Password Input -->
            <div class="mb-3 input-group">
                <span class="input-group-text bg-transparent border-0 text-white">
                    <i class="bi bi-lock-fill"></i>
                </span>
                <input type="password" id="password" class="form-control" placeholder="New Password" required>

                <!-- Toggle -->
                <button type="button" class="btn btn-outline-light" onclick="togglePassword()">
                    <i class="bi bi-eye-fill"></i>
                </button>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3 input-group">
                <span class="input-group-text bg-transparent border-0 text-white">
                    <i class="bi bi-shield-lock-fill"></i>
                </span>
                <input type="password" class="form-control" placeholder="Confirm Password" required>
            </div>

            <!-- Button -->
            <button class="btn btn-primary w-100 mb-3">
                Update Password
            </button>

        </form>

        <!-- Back Link -->
        <div>
            <a href="index.html">⬅ Back to Login</a>
        </div>

    </div>

</div>

<!-- JS -->
<script>
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = (pass.type === "password") ? "text" : "password";
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
